<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pose-Controlled MP3</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      background: url('exampl.jpg') no-repeat center center fixed;
      background-size: cover;
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    h1 {
      font-size: 3rem;
      color: white;
      text-align: center;
      margin-top: 40px;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 350px;
      background: rgba(20, 20, 20, 0.8);
      border-right: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 4px 0 20px rgba(100, 100, 100, 0.4);
      border-top-right-radius: 25px;
      border-bottom-right-radius: 25px;
      transition: transform 0.4s ease-in-out;
      padding: 20px;
      z-index: 10;
    }

    .sidebar.hidden {
      transform: translateX(-330px);
    }

    .toggle-btn {
      position: absolute;
      top: 20px;
      right: -25px;
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      text-align: center;
      line-height: 40px;
      font-size: 18px;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
      transition: background-color 0.3s ease;
    }

    .toggle-btn:hover {
      background-color: rgba(50, 50, 50, 0.8);
    }

    #canvas {
      width: 100%;
      border: 2px solid #333;
      border-radius: 12px;
    }

    #label-container div {
      font-size: 16px;
      font-weight: bold;
      margin-top: 5px;
      color: white;
    }

    .video-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 80px);
      flex-direction: column;
    }

    audio {
      width: 500px;
      max-width: 90%;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      margin-bottom: 20px;
    }

    .start-btn {
      margin-top: 20px;
      padding: 10px 30px;
      font-size: 18px;
      border: 2px solid white;
      color: white;
      background: transparent;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .start-btn:hover {
      background-color: rgba(255,255,255,0.2);
    }

    input[type="file"] {
      margin: 10px 0;
      color: white;
      font-weight: bold;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      border: 1px solid white;
    }

    .status {
      color: white;
      margin-top: 10px;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div class="sidebar" id="sidebar">
    <div class="toggle-btn" id="toggleBtn">&#x25C0;</div>
    <canvas id="canvas"></canvas>
    <div id="label-container"></div>
  </div>

  <h1>Pose-Controlled MP3</h1>

  <div class="video-container">
    <input type="file" id="audioFile" accept=".mp3,audio/*">
    <audio id="myAudio" controls></audio>
    <div class="status" id="status">Please select an MP3 file</div>
    <button class="start-btn" onclick="init()">Start</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/YfVdBQMIb/";
    let model, webcam, ctx, labelContainer, maxPredictions;
    let audio = document.getElementById("myAudio");
    let rewindTimer = null;
    let volumeTimer = null;
    let isAudioReady = false;

    function loadAudio(event) {
      const file = event.target.files[0];
      if (!file) return;

      const statusElement = document.getElementById("status");
      statusElement.textContent = "Loading audio file...";

      const fileURL = URL.createObjectURL(file);
      audio.src = fileURL;
      
      // Clear previous event listeners to avoid duplicates
      audio.oncanplay = null;
      audio.onerror = null;
      
      audio.oncanplay = () => {
        isAudioReady = true;
        statusElement.textContent = "Audio loaded and ready!";
        console.log("Audio loaded and ready to play");
      };
      
      audio.onerror = () => {
        statusElement.textContent = "Error loading audio file";
        console.error("Error loading audio file");
      };
      
      audio.load();
    }

    async function init() {
      if (!isAudioReady) {
        document.getElementById("status").textContent = "Please load an audio file first";
        return;
      }

      document.getElementById("status").textContent = "Initializing pose detection...";
      
      try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const size = 300;
        const flip = true;
        webcam = new tmPose.Webcam(size, size, flip);
        await webcam.setup();
        await webcam.play();
        
        const canvas = document.getElementById("canvas");
        canvas.width = size;
        canvas.height = size;
        ctx = canvas.getContext("2d");

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
          labelContainer.appendChild(document.createElement("div"));
        }

        document.getElementById("status").textContent = "Pose detection ready! Make poses to control playback.";
        window.requestAnimationFrame(loop);
      } catch (error) {
        document.getElementById("status").textContent = "Error initializing pose detection: " + error.message;
        console.error("Error initializing pose detection:", error);
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      if (!model) return;
      
      try {
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        const prediction = await model.predict(posenetOutput);

        for (let i = 0; i < maxPredictions; i++) {
          const classPrediction = 
            prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(1) + "%";
          labelContainer.childNodes[i].innerHTML = classPrediction;
        }

        const highest = prediction.reduce((prev, curr) =>
          (prev.probability > curr.probability ? prev : curr)
        );
        const className = highest.className.trim();
        const confidence = highest.probability;

        if (confidence > 0.9) {
          handleAction(className);
        }

        drawPose(pose);
      } catch (error) {
        console.error("Error during prediction:", error);
      }
    }

    function handleAction(className) {
      if (!audio || audio.readyState < 2) {
        console.warn("Audio not ready for control");
        return;
      }

      clearTimersExcept(className);

      switch (className) {
        case "play":
          audio.play();
          break;
        case "pause":
          audio.pause();
          break;
        case "backwards":
          rewindAction();
          if (!rewindTimer) {
            rewindTimer = setInterval(() => rewindAction(), 5000);
          }
          break;
        case "normal":
          break;
        case "volume increase":
          volumeUpAction();
          if (!volumeTimer) {
            volumeTimer = setInterval(() => volumeUpAction(), 4000);
          }
          break;
      }
    }

    function rewindAction() {
      audio.currentTime = Math.max(audio.currentTime - 10, 0);
    }

    function volumeUpAction() {
      audio.volume = Math.min(audio.volume + 0.05, 1);
    }

    function clearTimersExcept(activeClass) {
      if (activeClass !== "backwards" && rewindTimer) {
        clearInterval(rewindTimer);
        rewindTimer = null;
      }
      if (activeClass !== "volume increase" && volumeTimer) {
        clearInterval(volumeTimer);
        volumeTimer = null;
      }
    }

    function drawPose(pose) {
      if (webcam.canvas) {
        ctx.drawImage(webcam.canvas, 0, 0);
        if (pose) {
          const minPartConfidence = 0.5;
          tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
          tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
        }
      }
    }

    const toggleBtn = document.getElementById("toggleBtn");
    const sidebar = document.getElementById("sidebar");

    toggleBtn.onclick = () => {
      sidebar.classList.toggle("hidden");
      toggleBtn.innerHTML = sidebar.classList.contains("hidden") ? "&#x25B6;" : "&#x25C0;";
    };

    // Initialize audio element reference
    audio.addEventListener('error', () => {
      document.getElementById("status").textContent = "Error loading audio file";
    });
  </script>
</body>
</html>
